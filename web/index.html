<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxy Panel</title>
    <!--
      Inline theme bootstrap. Reads the stored choice and applies it to <html>
      before any React code runs, so users don't see a FOUC flash.
    -->
    <script>
      (() => {
        const valid = ['sakura', 'light', 'dark', 'system'];
        let mode = 'sakura';
        try {
          const stored = localStorage.getItem('proxy-panel-theme-mode');
          if (valid.includes(stored)) mode = stored;
        } catch {}
        const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = mode === 'system' ? (systemDark ? 'dark' : 'light') : mode;
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
